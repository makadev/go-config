# config.local.yaml - Local development overrides (highest priority)
app_name: "DevApp"
debug: true
timeout: "10s"

server:
  host: "localhost"
  port: 8080
  tls: false

database:
  host: "localhost"
  name: "dev_db"
  username: "dev_user"
  password: "dev_password"
  ssl_mode: "disable"
  max_connections: 5

logging:
  level: "debug"
  output: "stdout"

features:
  enable_profiling: true
  beta_features: true

metadata:
  environment: "development"
